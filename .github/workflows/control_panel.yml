name: Control Panel CI
permissions:
  contents: read

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for changes to the control_panel directory
  push:
    paths: ["control_panel/**"]
  pull_request:
    branches: ["main"]
    paths: ["control_panel/**"]


  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  lint:
    name: "ruff lint and format checks"
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Check formatting with ruff
        run: |
          uv run --project control_panel --extra dev ruff format --check control_panel

      - name: Lint with ruff
        run: |
          uv run --project control_panel --extra dev ruff check control_panel

      - name: Type check with mypy
        run: |
          uv run --project control_panel --extra dev mypy control_panel

  test:
      name: "run pytest"
      # The type of runner that the job will run on
      runs-on: ubuntu-latest

      # Steps represent a sequence of tasks that will be executed as part of the job
      steps:
        # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
        - uses: actions/checkout@v4
        - uses: actions/setup-python@v5
          with:
            python-version: "3.12"

        # adapted from GitHub docs for building and testing Python
        # https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python
        # and strategies used in Python samples
        # https://github.com/GoogleCloudPlatform/python-docs-samples/blob/main/noxfile-template.py
        - name: Install dependencies
          # install pytest, module dependencies and tool itself
          run: |
            python -m pip install --upgrade pip
            pip install pytest
            pip install -r control_panel/requirements.txt
            pip install control_panel/
        - name: Test with pytest
          run: |
            pytest control_panel/

  test-frontend:
      name: "run frontend tests"
      runs-on: ubuntu-latest

      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-node@v4
          with:
            node-version: "24"
            cache: 'npm'
            cache-dependency-path: control_panel/package-lock.json

            
        - name: Install dependencies
          run: |
            cd control_panel
            npm ci
            
        - name: Test with npm
          run: |
            cd control_panel
            npm test
