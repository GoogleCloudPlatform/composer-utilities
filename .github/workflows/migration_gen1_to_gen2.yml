# This is a basic workflow to help you get started with Actions

name: Migration Gen1 to Gen2 CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for changes to the migration/gen1_to_gen2 directory
  push:
    paths: ["migration/gen1_to_gen2/**"]
  pull_request:
    branches: ["main"]
    paths: ["migration/gen1_to_gen2/**"]
    

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  lint:
    name: "ruff lint and format checks"
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Check formatting with ruff
        run: |
          uv run --project migration/gen1_to_gen2 --extra dev ruff format --check migration/gen1_to_gen2

      - name: Lint with ruff
        run: |
          uv run --project migration/gen1_to_gen2 --extra dev ruff check migration/gen1_to_gen2

      - name: Type check with mypy
        run: |
          uv run --project migration/gen1_to_gen2 --extra dev mypy migration/gen1_to_gen2 --exclude "test_resources"

  test:
      name: "run pytest"
      # The type of runner that the job will run on
      runs-on: ubuntu-latest

      # Steps represent a sequence of tasks that will be executed as part of the job
      steps:
        # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
        - uses: actions/checkout@v4
        - uses: actions/setup-python@v5
          with:
            python-version: "3.10"

        # adapted from GitHub docs for building and testing Python
        # https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python
        # and strategies used in Python samples
        # https://github.com/GoogleCloudPlatform/python-docs-samples/blob/main/noxfile-template.py
        - name: Install dependencies
          # install pytest, module dependencies and tool itself
          run: |
            python -m pip install --upgrade pip
            pip install pytest
            pip install -r migration/gen1_to_gen2/requirements.txt
            pip install migration/gen1_to_gen2/
        - name: Test with pytest
          run: |
            pytest migration/gen1_to_gen2/
